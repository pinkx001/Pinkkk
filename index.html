<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asutinshop Payment</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #fffdf5 0%, #f0f7ff 100%);
            min-height: 100vh;
        }
        
        @keyframes float-up-down {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(10deg); }
        }
        @keyframes float-left-right {
            0%, 100% { transform: translateX(0px) rotate(0deg); }
            50% { transform: translateX(15px) rotate(-10deg); }
        }
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        @keyframes spin-slow { 100% { transform: rotate(360deg); } }
        @keyframes dash-animation {
            from { stroke-dashoffset: 0; }
            to { stroke-dashoffset: -24; }
        }
        .animate-dash { animation: dash-animation 1s linear infinite; }
        .anim-float-1 { animation: float-up-down 4s ease-in-out infinite; }
        .anim-float-2 { animation: float-up-down 5s ease-in-out infinite 1.5s; }
        .anim-float-3 { animation: float-left-right 6s ease-in-out infinite; }
        .anim-float-4 { animation: float-left-right 4.5s ease-in-out infinite 2s; }
        .anim-pulse { animation: pulse-soft 3s ease-in-out infinite; }
        .anim-spin { animation: spin-slow 8s linear infinite; }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 20px 50px -10px rgba(100, 150, 255, 0.15);
        }

        .virtual-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .virtual-card:hover { transform: translateY(-4px); }
        ::-webkit-scrollbar { width: 0px; }
    </style>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#3b82f6',
                            pink: '#f472b6',
                            yellow: '#fbbf24',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="flex flex-col items-center py-6 px-4 text-slate-700 relative overflow-x-hidden">

    <!-- Background Decorative SVGs -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
        <svg class="absolute top-[5%] left-[10%] w-8 h-8 text-brand-pink anim-float-1" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
        <svg class="absolute top-[15%] left-[2%] w-6 h-6 text-brand-yellow anim-pulse" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        <svg class="absolute bottom-[10%] right-[10%] w-10 h-10 text-brand-blue/30 anim-float-2" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-slate-800/95 text-white px-6 py-3 rounded-full shadow-xl transition-all duration-300 opacity-0 translate-y-4 pointer-events-none z-50 flex items-center gap-2 font-medium text-sm">
        คัดลอกข้อมูลแล้ว
    </div>

    <!-- Container -->
    <div class="max-w-[420px] w-full relative z-10 space-y-5 pb-10">
        
        <!-- Header -->
        <div class="text-center pt-2 pb-2">
            <h1 class="text-2xl font-bold text-slate-800 flex items-center justify-center gap-2">
                asutinshop
            </h1>
            <p class="text-sm font-medium text-slate-500 mt-1">Payment & Checkout</p>
        </div>

        <!-- Main Card -->
        <div class="glass-card rounded-[40px] p-3">
            
            <!-- Image Area -->
            <div class="relative p-2 rounded-[36px] z-10">
                <svg class="absolute inset-0 w-full h-full pointer-events-none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="2" y="2" width="calc(100% - 4px)" height="calc(100% - 4px)" rx="34" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-dasharray="12 12" stroke-linecap="round" class="animate-dash" />
                </svg>
                <div class="rounded-[28px] overflow-hidden relative shadow-sm border-[4px] border-white">
                    <img src="https://i.postimg.cc/gJ184jjr/IMG-3405.jpg" alt="Payment QR" class="w-full h-auto object-cover">
                </div>
            </div>

            <div class="p-4 pt-6 space-y-5">
                <div class="text-center space-y-3">
                    <p class="text-[15px] font-medium text-slate-700">
                        ชื่อบัญชี <span class="text-brand-blue font-bold">asutin</span> เท่านั้นน้า!!
                    </p>
                    <div class="inline-flex items-center justify-center gap-1.5 text-[11px] text-red-500 font-bold bg-red-50 px-4 py-2 rounded-full border border-red-100">
                        ⚠️ เมลโดนปิดไม่รับเคลม ⚠️
                    </div>
                </div>

                <!-- Account Area -->
                <div class="space-y-4">
                    <div class="virtual-card relative bg-gradient-to-r from-blue-500 to-blue-600 rounded-[24px] p-5 shadow-lg text-white cursor-pointer" onclick="copyText('ASUTIN', this)">
                        <div class="flex justify-between items-center">
                            <span class="font-bold">PromptPay / Account</span>
                            <span class="text-xs bg-white/20 px-2 py-1 rounded-lg">คัดลอก</span>
                        </div>
                        <div class="mt-2 text-2xl font-bold tracking-widest">ASUTIN</div>
                    </div>
                </div>

                <!-- Warnings -->
                <div class="bg-amber-50 border border-amber-200 rounded-2xl p-4 text-[13px] text-amber-900 font-medium">
                    ⚠️ โอนผิด โอนเกินทบยอดไว้มาใช้บริการกับร้านครั้งหน้าเท่านั้น
                </div>

                <!-- Extra Info -->
                <img src="https://i.postimg.cc/C5Q1JKCW/mi-m-ch-x-101-20260620093228.png" class="w-full rounded-2xl" alt="Details">
            </div>
        </div>

    </div>

    <script>
        function copyText(text, el) {
            navigator.clipboard.writeText(text);
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0', 'translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => { toast.classList.remove('opacity-100', 'translate-y-0'); toast.classList.add('opacity-0', 'translate-y-4'); }, 2000);
        }
    </script>
</body>
</html>
